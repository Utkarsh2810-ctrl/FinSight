# -------------------------------------------------------
# Server
# -------------------------------------------------------
server.port=${PORT:8080}

# -------------------------------------------------------
# Datasource — H2 for local dev, PostgreSQL in production
# Override via env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
#   SPRING_DATASOURCE_PASSWORD, SPRING_DATASOURCE_DRIVER, SPRING_JPA_DIALECT
# -------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/finsightdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# -------------------------------------------------------
# JWT — override JWT_SECRET in production
# -------------------------------------------------------
jwt.secret=${JWT_SECRET:finsight-super-secret-key-change-in-production-minimum-32-chars}
jwt.expiration-ms=2592000000

# -------------------------------------------------------
# CORS — override APP_ALLOWED_ORIGINS in production
# -------------------------------------------------------
app.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:8000}

# -------------------------------------------------------
# Logging & Actuator
# -------------------------------------------------------
logging.level.com.finsight=DEBUG
logging.level.org.springframework.security=WARN
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never