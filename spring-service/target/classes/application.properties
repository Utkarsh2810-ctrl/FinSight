server.port=8080
spring.datasource.url=jdbc:h2:file:./data/finsightdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
jwt.secret=finsight-super-secret-key-change-in-production-minimum-32-chars
jwt.expiration-ms=2592000000
app.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:8000
logging.level.com.finsight=DEBUG
logging.level.org.springframework.security=WARN
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never